<!DOCTYPE html>
<html>
<head>
  <title>Video Hub</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    h2 {
      padding: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #1f1f1f;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .info {
      padding: 10px;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
    }

    .desc {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h2>My Video Hub</h2>

<div class="container" id="container"></div>

<script>

const links = [
  "https://openai.com",
  "https://github.com",
  "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
];

// FREE metadata API
const API = "https://jsonlink.io/api/extract?url=";

async function load() {
  const container = document.getElementById("container");

  for (let url of links) {
    try {
      let res = await fetch(API + encodeURIComponent(url));
      let data = await res.json();

      let card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${data.images[0] || 'https://via.placeholder.com/300'}">
        <div class="info">
          <div class="title">${data.title || 'No title'}</div>
          <div class="desc">${data.description || 'No description'}</div>
        </div>
      `;

      card.onclick = () => window.open(url, "_blank");

      container.appendChild(card);

    } catch (e) {
      console.log("Error:", e);
    }
  }
}

load();

</script>

</body>
</html>
