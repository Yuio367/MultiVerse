<!DOCTYPE html>
<html>
<head>
  <title>Anime Browser</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg, #8a2be2, #00ffff);
      color: white;
      cursor: pointer;
    }

    /* HOME SCREEN */
    .home {
      padding: 20px;
      animation: fade 1s;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* BROWSER VIEW */
    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      display: none;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
  <button onclick="home()">Home</button>
</div>

<!-- HOME -->
<div class="home" id="home">

  <h2>🔥 Anime Browser</h2>

  <div class="card" onclick="openSite('https://google.com')">
    🌐 Open Google
  </div>

  <div class="card" onclick="openSite('https://youtube.com')">
    ▶️ Open YouTube
  </div>

  <div class="card" onclick="openSite('https://github.com')">
    💻 Open GitHub
  </div>

</div>

<!-- BROWSER -->
<iframe id="browser"></iframe>

<script>

function go() {
  let url = document.getElementById("url").value;

  if (!url.startsWith("http")) {
    url = "https://www.google.com/search?q=" + url;
  }

  openSite(url);
}

function openSite(link) {
  document.getElementById("home").style.display = "none";

  let browser = document.getElementById("browser");
  browser.style.display = "block";
  browser.src = link;
}

function home() {
  document.getElementById("browser").style.display = "none";
  document.getElementById("home").style.display = "block";
}

</script>

</body>
</html>
